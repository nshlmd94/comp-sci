<!DOCTYPE html>

<html>
    <head>
        <link href="styles.css" rel="stylesheet">
        <script src="script.js"></script>
        <title>Trivia!</title>
    </head>
    <body>
        <div class="page-heading">
            <h1 id="header">Trivia!</h1>
        </div>
        <ul>
            <div class="heading">
                <h2>Part 1: Multiple Choice</h2>
            </div>
            <hr class="line"></hr>
            <div class="question">
                <h3>What is the approximate ratio of people to sheep in New Zealand?</h3>
            </div>
            <div class="options">
                <input type="button", class="select-button", name="response", value="6 people per 1 sheep">
                <input type="button", class="select-button", name="response", value="3 people per 1 sheep">
                <input type="button", class="select-button", name="response", value="1 person per 1 sheep">
                <input type="button", class="select-button", name="response", value="1 person per 3 sheep">
                <input type="button", class="select-button", name="response", value="1 person per 6 sheep">
            </div>
            <div class="output1"></div>
        </ul>
        <ul>
            <div class="heading">
                <h2>Part 2: Free Response</h2>
            </div>
            <hr class="line"></hr>
            <div class="question">
                <h3>In which country is it illegal to own a single guinea pig, as a lone guinea pig might get lonely?</h3>
            </div>
            <div class="input-box">
                <input type="text" id="text-field", name="response">
                <input type="submit" id="check-box", name="check", value="Check Answer">
            </div>
            <div class="output2"></div>
        </ul>
        
    </body>
</html>
