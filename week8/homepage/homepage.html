<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link href="hp-style.css" rel="stylesheet">
    <script src="hp-script.js"></script>
    <title>Hi, Pookie!</title>
</head>

<body>
    <h1>Hi, Pookie!</h1>
    <p>How are you feeling?</p>
    <div class="emoji-grid">
        <input type="button" class="box box-0", name="happy", value="😊">
        <input type="button" class="box box-1", name="calm", value="😇">
        <input type="button" class="box box-2", name="meh", value="😑">
        <input type="button" class="box box-3", name="sad", value="😞">
        <input type="button" class="box box-4", name="angry", value="😡">
        <input type="button" class="box box-5", name="sleepy", value="😴">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
</body>

</html>
